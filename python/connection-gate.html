<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reachy Control</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #050A12;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  user-select: none; -webkit-user-select: none;
  overflow: hidden;
}

.gate {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
}

/* ── Robot card ── */
.robot-card {
  width: 240px; height: 280px;
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  background: #1a2e5a;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 20px 60px rgba(0,0,0,0.7);
  transition: box-shadow 0.5s ease, background 0.5s ease;
}
.robot-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.35s ease;
}
.robot-card .dot {
  position: absolute; top: 12px; right: 12px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #374151;
  transition: background 0.4s, box-shadow 0.4s;
}

.card-connecting, .card-waking { box-shadow: 0 0 0 1px rgba(245,158,11,0.3), 0 20px 60px rgba(0,0,0,0.7); }
.card-connected  { box-shadow: 0 0 0 1px rgba(96,165,250,0.3), 0 20px 60px rgba(0,0,0,0.7), 0 0 30px rgba(96,165,250,0.08); }
.card-awake      { box-shadow: 0 0 0 1px rgba(61,222,153,0.4), 0 20px 60px rgba(0,0,0,0.7), 0 0 50px rgba(61,222,153,0.18); }
.card-error      { box-shadow: 0 0 0 1px rgba(255,97,112,0.35), 0 20px 60px rgba(0,0,0,0.7); }

.dot-connecting, .dot-waking { background: #F59E0B; box-shadow: 0 0 6px #F59E0B; animation: blink 0.9s infinite; }
.dot-connected  { background: #60A5FA; box-shadow: 0 0 6px #60A5FA; }
.dot-awake      { background: #3DDE99; box-shadow: 0 0 8px #3DDE99; animation: blink 2s infinite; }
.dot-error      { background: #FF6170; box-shadow: 0 0 6px #FF6170; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ── Text ── */
.eyebrow {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.title {
  font-size: 24px; font-weight: 700;
  line-height: 1.2; text-align: center;
  min-height: 58px;
  display: flex; align-items: center; justify-content: center;
}
.detail {
  font-size: 13px; color: rgba(202,211,223,0.6);
  text-align: center; max-width: 300px;
  line-height: 1.55; min-height: 40px;
}

/* ── Spinner row ── */
.spin-row {
  display: flex; align-items: center; gap: 8px;
  min-height: 22px;
}
.spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.12);
  border-top-color: #F59E0B;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.spinner.on { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

.robot-name {
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  min-height: 16px;
}

/* ── Button ── */
.btn {
  height: 42px; padding: 0 30px;
  border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; outline: none;
  transition: opacity 0.15s, transform 0.1s;
  min-width: 150px; letter-spacing: 0.01em;
}
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: default; }

.btn-green  { background: #3DDE99; color: #041009; }
.btn-green:hover:not(:disabled) { background: #50EAA8; }
.btn-blue   { background: #60A5FA; color: #030D1F; }
.btn-blue:hover:not(:disabled)  { background: #74B5FF; }
.btn-red    { background: rgba(255,97,112,0.15); color: #FF8080;
              border: 1px solid rgba(255,97,112,0.28); }
.btn-red:hover:not(:disabled)   { background: rgba(255,97,112,0.25); }
</style>
</head>
<body>
<div class="gate">
  <div class="robot-card" id="card">
    <img id="robotImg" src="{{SVG_SLEEPING}}" draggable="false">
    <div class="dot" id="dot"></div>
  </div>

  <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="eyebrow">Reachy Control · Mini Lite</div>
    <div class="spin-row">
      <div class="spinner" id="spinner"></div>
    </div>
    <div class="title" id="title">Starting up</div>
    <div class="detail" id="detail">Initializing the robot daemon…</div>
  </div>

  <div class="robot-name" id="robotName"></div>

  <button class="btn btn-green" id="btn" onclick="handleBtn()" disabled>Connect</button>
</div>

<script>
const SVG = {
  sleeping: "{{SVG_SLEEPING}}",
  awake:    "{{SVG_AWAKE}}",
  ko:       "{{SVG_KO}}"
};

let state = 'starting';

const STATES = {
  starting:   { card:'', dot:'',              img:'sleeping', title:'Starting up',            detail:'Initializing the robot daemon\u2026', spin:true,  btnText:'Connect',       btnCls:'btn-green', enabled:false },
  idle:       { card:'', dot:'',              img:'sleeping', title:'Ready to connect',        detail:'Your Reachy Mini is waiting. Connect to bring it online.',                spin:false, btnText:'Connect',       btnCls:'btn-green', enabled:true  },
  connecting: { card:'card-connecting', dot:'dot-connecting', img:'sleeping', title:'Connecting\u2026',      detail:'Establishing connection to the robot over USB.',                          spin:true,  btnText:'Connecting\u2026', btnCls:'btn-green', enabled:false },
  connected:  { card:'card-connected',  dot:'dot-connected',  img:'sleeping', title:'Robot connected',       detail:'Reachy is online and ready. Wake it up to start.',                        spin:false, btnText:'Wake Up',       btnCls:'btn-blue',  enabled:true  },
  waking:     { card:'card-waking',     dot:'dot-waking',     img:'sleeping', title:'Waking up\u2026',       detail:'Playing the wake-up sequence.',                                          spin:true,  btnText:'Waking\u2026',  btnCls:'btn-blue',  enabled:false },
  awake:      { card:'card-awake',      dot:'dot-awake',      img:'awake',    title:'Reachy is awake!',      detail:'The robot is ready. Enter the app to start.',                             spin:false, btnText:'Enter App \u2192', btnCls:'btn-green', enabled:true  },
  error:      { card:'card-error',      dot:'dot-error',      img:'ko',       title:'Connection failed',     detail:'Could not connect. Make sure Reachy is powered on and connected via USB.', spin:false, btnText:'Try Again',     btnCls:'btn-red',   enabled:true  },
};

function updateState(newState, name, errMsg) {
  state = newState;
  const cfg = STATES[newState];
  if (!cfg) return;

  const card   = document.getElementById('card');
  const img    = document.getElementById('robotImg');
  const dot    = document.getElementById('dot');
  const title  = document.getElementById('title');
  const detail = document.getElementById('detail');
  const spin   = document.getElementById('spinner');
  const btn    = document.getElementById('btn');
  const rn     = document.getElementById('robotName');

  card.className = 'robot-card' + (cfg.card ? ' ' + cfg.card : '');
  dot.className  = 'dot' + (cfg.dot ? ' ' + cfg.dot : '');

  const newSrc = SVG[cfg.img];
  if (img.src !== newSrc) {
    img.style.opacity = '0';
    setTimeout(() => { img.src = newSrc; img.style.opacity = '1'; }, 180);
  }

  title.textContent  = cfg.title;
  detail.textContent = (newState === 'error' && errMsg) ? errMsg : cfg.detail;
  spin.className     = 'spinner' + (cfg.spin ? ' on' : '');
  btn.textContent    = cfg.btnText;
  btn.className      = 'btn ' + cfg.btnCls;
  btn.disabled       = !cfg.enabled;

  rn.textContent = (name && (newState === 'connected' || newState === 'awake')) ? name : '';
}

function handleBtn() {
  const map = { idle:'connect', connected:'wakeUp', awake:'enter', error:'retry' };
  const action = map[state];
  if (action) window.webkit.messageHandlers.reachy.postMessage({ action });
}
</script>
</body>
</html>
